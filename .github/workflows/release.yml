name: Release workflow

# TODO: Maintain floating version tags to allow flexible version pinning,
# so users can reference actions with major (v1) or minor (v1.2) tags.

on:
  push:
    branches:
      - main

permissions: {} # No permissions by default on workflow level

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create releases and tags
      pull-requests: write # Needed to create release PRs
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: ${{ github.ref_name }}

      - name: Debug release-please outputs
        run: |
          echo "releases_created: ${{ steps.release.outputs.releases_created }}"
          echo "paths_released: ${{ steps.release.outputs.paths_released }}"
          echo "--- Full JSON outputs ---"
          echo '${{ toJSON(steps.release.outputs) }}'

      - name: Delete release (keep tag only)
        if: ${{ steps.release.outputs['actions/zizmor--release_created'] }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ steps.release.outputs['actions/zizmor--tag_name'] }}"
          echo "Deleting release: $TAG_NAME"
          gh release delete "$TAG_NAME" --yes --cleanup-tag=false --repo ${{ github.repository }}
